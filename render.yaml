# Render.com Blueprint for paxor
# Deploy with: Render Dashboard -> New -> Blueprint -> point at this repo.
# Managed Postgres (PostGIS) + Key Value (Redis) + Dockerized FastAPI + static SPA.

databases:
  - name: paxor-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  # Redis (Render Key Value) for the bbox/station response cache.
  - type: keyvalue
    name: paxor-redis
    plan: starter
    ipAllowList: []

  # FastAPI backend (Docker). PostGIS extension is created by Alembic env.py.
  - type: web
    name: paxor-backend
    runtime: docker
    plan: standard
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    # Run DB migrations, then seed NDW data when the database is still empty.
    # Initial locations sync takes several minutes; committing in batches keeps
    # memory bounded on Render's smaller instances. Render tokenizes the
    # pre-deploy command on whitespace without honoring quotes, so `&&` and even
    # `sh -c "..."` break. The steps live in a committed script instead.
    preDeployCommand: bash scripts/predeploy.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paxor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: paxor-redis
          property: connectionString
      # Public URL — `property: host` is the private-network hostname and is not
      # valid for CORS origins or browser redirects.
      - key: FRONTEND_URL
        value: https://paxor.ai
      - key: APP_NAME
        value: paxor
      - key: TZ
        value: Europe/Amsterdam
      # Set these in the Render dashboard (marked sync:false = not committed).
      - key: ADMIN_SYNC_TOKEN
        sync: false

  # React/Vite SPA served as a static site.
  - type: web
    name: paxor-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Public URL baked into the Vite bundle at build time. Do not use
      # `fromService: property: host` — that is the private-network hostname.
      - key: VITE_API_URL
        value: https://paxor-backend.onrender.com
      # Set in Render dashboard (Google Cloud Web client ID).
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
